<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Log in — Xchange</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<script src="login.js" defer></script>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --surface3: #222232;
    --border: rgba(255,255,255,0.07);
    --border-hover: rgba(255,255,255,0.14);
    --text: #f0f0f8;
    --muted: #6b6b88;
    --accent: #7c6bff;
    --accent-dim: rgba(124,107,255,0.15);
    --green: #2dd4a0;
    --red: #ff6b6b;
    --red-dim: rgba(255,107,107,0.12);
    --mono: 'DM Mono', monospace;
    --display: 'Syne', sans-serif;
    --radius: 12px;
    --radius-sm: 8px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--display);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 15% 20%, rgba(124,107,255,0.1) 0%, transparent 60%),
      radial-gradient(ellipse 40% 40% at 85% 75%, rgba(45,212,160,0.06) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── TOP NAV ── */
  nav {
    position: fixed; top: 0; left: 0; right: 0;
    display: flex; align-items: center; justify-content: space-between;
    padding: 1rem 2rem; border-bottom: 1px solid var(--border);
    background: rgba(10,10,15,0.85); backdrop-filter: blur(12px);
    z-index: 10;
  }
  .logo { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; color: var(--text); text-decoration: none; }
  .logo span { color: var(--accent); }
  .nav-right { display: flex; align-items: center; gap: 10px; font-size: 13px; color: var(--muted); }
  .nav-right a { color: var(--accent); text-decoration: none; font-weight: 600; }
  .nav-right a:hover { text-decoration: underline; }

  /* ── CARD ── */
  .card-wrap {
    position: relative; z-index: 1;
    width: 100%; max-width: 420px;
    margin-top: 5rem;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 2rem;
  }

  .card-header { margin-bottom: 1.75rem; }
  .card-header h1 { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
  .card-header p { font-size: 13px; color: var(--muted); margin-top: 6px; }

  /* ── FORM ── */
  .form-field { margin-bottom: 1.125rem; }
  .form-field label {
    display: block; font-size: 11px; font-weight: 600;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 7px;
  }
  .form-input {
    width: 100%; height: 44px; padding: 0 14px;
    font-size: 14px; font-family: var(--display);
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); color: var(--text);
    outline: none; transition: border-color 0.15s;
  }
  .form-input:focus { border-color: var(--accent); }
  .form-input.error { border-color: var(--red); }

  .password-wrap { position: relative; }
  .password-wrap .form-input { padding-right: 44px; }
  .toggle-pw {
    position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
    background: none; border: none; cursor: pointer; color: var(--muted); padding: 4px;
    font-size: 16px; transition: color 0.15s; line-height: 1;
  }
  .toggle-pw:hover { color: var(--text); }

  .field-hint { font-size: 11px; color: var(--muted); margin-top: 5px; font-family: var(--mono); }
  .field-error { font-size: 11px; color: var(--red); margin-top: 5px; font-family: var(--mono); display: none; }

  .forgot-row { text-align: right; margin-top: -6px; margin-bottom: 1.125rem; }
  .forgot-row a { font-size: 12px; color: var(--muted); text-decoration: none; transition: color 0.15s; }
  .forgot-row a:hover { color: var(--accent); }

  .btn-submit {
    width: 100%; height: 46px; border-radius: var(--radius-sm);
    font-size: 14px; font-weight: 700; font-family: var(--display);
    background: var(--accent); border: none; color: #fff;
    cursor: pointer; transition: background 0.15s; letter-spacing: 0.02em;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn-submit:hover { background: #9b8dff; }
  .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }

  /* ── DIVIDER ── */
  .divider { display: flex; align-items: center; gap: 12px; margin: 1.25rem 0; }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .divider span { font-size: 11px; color: var(--muted); white-space: nowrap; font-family: var(--mono); }

  /* ── OAUTH BUTTONS ── */
  .oauth-btn {
    width: 100%; height: 42px; border-radius: var(--radius-sm);
    font-size: 13px; font-weight: 600; font-family: var(--display);
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); cursor: pointer; transition: all 0.15s;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    margin-bottom: 8px; text-decoration: none;
  }
  .oauth-btn:hover { border-color: var(--border-hover); background: var(--surface3); }
  .oauth-icon { width: 18px; height: 18px; flex-shrink: 0; }

  /* ── FOOTER LINK ── */
  .card-footer {
    text-align: center; margin-top: 1.5rem;
    font-size: 13px; color: var(--muted);
  }
  .card-footer a { color: var(--accent); text-decoration: none; font-weight: 600; }
  .card-footer a:hover { text-decoration: underline; }

  /* ── ALERT ── */
  .alert {
    border-radius: var(--radius-sm); padding: 10px 14px; font-size: 13px;
    font-family: var(--mono); margin-bottom: 1.25rem; display: none;
  }
  .alert.error { background: var(--red-dim); border: 1px solid rgba(255,107,107,0.2); color: var(--red); }
  .alert.success { background: rgba(45,212,160,0.1); border: 1px solid rgba(45,212,160,0.2); color: var(--green); }

  /* ── SPINNER ── */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner {
    width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; display: none;
  }

  @media (max-width: 480px) {
    nav { padding: 1rem 1.25rem; }
    .card { padding: 1.5rem; }
  }
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <a href="index.html" class="logo">X<span>change</span></a>
  <div class="nav-right">
    No account? <a href="signup.html">Sign up free</a>
  </div>
</nav>

<!-- FORM CARD -->
<div class="card-wrap">
  <div class="card">
    <div class="card-header">
      <h1>Welcome back</h1>
      <p>Log in to access your wallets and rates.</p>
    </div>

    <div class="alert" id="alert"></div>

    <!-- OAUTH OPTIONS -->
    <a class="oauth-btn" href="#" id="googleBtn">
      <!-- Google G icon -->
      <svg class="oauth-icon" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
        <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
        <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
        <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
        <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
      </svg>
      Continue with Google
    </a>

    <div class="divider"><span>or log in with email</span></div>

    <!-- EMAIL FORM -->
    <div class="form-field">
      <label>Email address</label>
      <input class="form-input" type="email" id="email" placeholder="you@example.com" autocomplete="email" />
      <div class="field-error" id="emailErr">Please enter a valid email.</div>
    </div>

    <div class="form-field">
      <label>Password</label>
      <div class="password-wrap">
        <input class="form-input" type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
        <button class="toggle-pw" id="togglePw" type="button" title="Show/hide password">👁</button>
      </div>
      <div class="field-error" id="pwErr">Password must be at least 8 characters.</div>
    </div>

    <div class="forgot-row">
      <a href="#">Forgot password?</a>
    </div>

    <button class="btn-submit" id="submitBtn" type="button">
      <span id="submitLabel">Log in</span>
      <div class="spinner" id="spinner"></div>
    </button>

    <div class="card-footer">
      Don't have an account? <a href="signup.html">Sign up free →</a>
    </div>
  </div>
</div>

<script src="login.js" defer></script>
</body>
</html>
